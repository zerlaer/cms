services:
  cms:
    container_name: cms
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8035:8080"
    environment:
      - GIN_MODE=release
    volumes:
      - ./backend/uploads:/app/backend/uploads
      - ./backend/template:/app/backend/template
    depends_on:
      - mysql
    restart: always
    networks:
      - app-network

  mysql:
    container_name: mysql
    image: mysql:8.1.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=mima41
      - MYSQL_DATABASE=cms
    volumes:
      - ./data:/var/lib/mysql
    restart: always
    networks:
      - app-network

  nginx:
    container_name: nginx
    image: nginx:alpine
    ports:
      - "8025:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - cms
    restart: always
    networks:
      - app-network

networks:
  app-network:
    external: true