version: '3.8'

services:
  cms:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "8080:8080"
    environment:
      - GIN_MODE=release
    volumes:
      - ./backend/uploads:/app/backend/uploads
      - ./backend/template:/app/backend/template
    depends_on:
      - mysql
    restart: always

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=mima41
      - MYSQL_DATABASE=cms
    volumes:
      - mysql-data:/var/lib/mysql
    restart: always

volumes:
  mysql-data: